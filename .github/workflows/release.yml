name: Release

# Builds the LC PeakPerf desktop app for macOS (Apple Silicon + Intel),
# Windows and Linux, and attaches the installers to a GitHub Release.
#
# Trigger it by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`)
# or manually from the Actions tab (Run workflow).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (M-series)
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest      # Intel Macs
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sign the update artifacts so installed apps trust the update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LC PeakPerf v__VERSION__'
          releaseBody: |
            **FAB Trade v__VERSION__** (formerly LC PeakPerf / TRADENET X)

            Highlights:
            - Rebrand to **FAB Trade** + a branded **sign-in** screen.
            - **Order Placement · AI** — caller verification, live call transcript, multi-order baskets, AI risk/compliance/buying-power checks, CASA top-up, and "what to pitch".
            - **Order Placement** — CIF autocomplete over 12 clients, browser-style client tabs with pinning, VIP toggle.
            - **Graph terminal** — hide/restore panels, drag panels by the title bar.
            - **Markets** — DFM (real-time) / ADX (simulated) across both Graph and Detailed views.
            - App — clean scrollbars, wider windows, in-app "Check for updates".

            See CHANGELOG.md for the full notes. Download the installer for your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
